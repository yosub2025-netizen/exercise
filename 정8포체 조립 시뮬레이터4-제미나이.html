<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정8포체(테서렉트) 4차원 조립 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        body { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #canvas-container { flex-grow: 1; position: relative; width: 100%; cursor: move; }
        .glass-panel { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* 슬라이더 스타일 */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); margin-top: -8px;}
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #334155; border-radius: 4px; }
        
        .btn-play { background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); transition: all 0.2s; }
        .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

    <header class="absolute top-0 w-full p-4 md:p-6 z-10 pointer-events-none">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start gap-4">
            <div>
                <div class="inline-block px-3 py-1 mb-2 rounded bg-blue-500/20 text-blue-300 text-xs font-bold border border-blue-500/30">Interactive 4D Math Engine</div>
                <h1 class="text-2xl md:text-3xl font-black text-white drop-shadow-lg">4차원 테서렉트 조립 시뮬레이터</h1>
                <p class="text-slate-300 text-sm mt-2 max-w-xl">
                    8개의 큐브가 <strong class="text-blue-400">실제 4차원 회전 행렬(W축)</strong>에 의해 굽어지며 조립됩니다.<br>
                    첨부된 이미지와 같이 완벽한 원근감과 투명도를 통해 안과 밖이 뒤집히는 과정을 관찰하세요.
                </p>
            </div>
            
            <div class="glass-panel p-4 rounded-xl text-sm font-medium space-y-3 pointer-events-auto">
                <div class="font-bold text-slate-200 border-b border-slate-600 pb-2 mb-2">큐브 색상 범례</div>
                <div class="flex items-center">
                    <span class="w-4 h-4 rounded bg-[#3b82f6] mr-3 shadow-[0_0_8px_#3b82f6] border border-blue-300"></span> 
                    중심 및 날개 큐브 (7개)
                </div>
                <div class="flex items-center">
                    <span class="w-4 h-4 rounded bg-[#f59e0b] mr-3 shadow-[0_0_8px_#f59e0b] border border-orange-300"></span> 
                    꼬리 / 뚜껑 큐브 (1개)
                </div>
            </div>
        </div>
    </header>

    <div id="canvas-container"></div>

    <footer class="absolute bottom-6 w-full px-4 z-10 pointer-events-none">
        <div class="max-w-4xl mx-auto glass-panel p-5 md:p-6 rounded-2xl pointer-events-auto border border-slate-600">
            <div class="flex flex-col md:flex-row gap-6 items-center">
                <!-- 재생 버튼 -->
                <button id="btn-play" class="btn-play text-white rounded-full w-14 h-14 flex items-center justify-center flex-shrink-0 focus:outline-none shadow-lg">
                    <svg id="icon-play" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                    <svg id="icon-pause" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                </button>

                <div class="flex-grow w-full">
                    <div class="flex justify-between items-end mb-2">
                        <label class="text-sm font-bold text-slate-200">4차원 공간(W축) 굽힘 각도</label>
                        <div class="text-2xl font-black text-blue-400"><span id="display-deg">0.0</span>°</div>
                    </div>
                    <input type="range" id="slider-fold" min="0" max="90" step="0.5" value="0">
                    <div class="flex justify-between text-xs text-slate-400 mt-2 font-medium">
                        <span>0° (3차원 십자가 전개도)</span>
                        <span>45° (경계선 교차)</span>
                        <span>90° (4차원 정8포체 완성)</span>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#020617'); // 어두운 배경

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(10, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, -1, 0);

        // 조명 세팅 (투명한 큐브의 질감을 살리기 위함)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 은은한 바닥 그리드
        const gridHelper = new THREE.GridHelper(20, 20, 0x334155, 0x1e293b);
        gridHelper.position.y = -6;
        scene.add(gridHelper);

        // 선생님 요청 반영: 파란색과 주황색만 사용
        const COLOR_BLUE = 0x3b82f6; // 중심 및 6개 날개
        const COLOR_ORANGE = 0xf59e0b; // 마지막 꼬리(뚜껑)
        
        const colors = [
            COLOR_BLUE, COLOR_BLUE, COLOR_BLUE, COLOR_BLUE, 
            COLOR_BLUE, COLOR_BLUE, COLOR_BLUE, COLOR_ORANGE
        ];

        // --- 4차원 기하학 생성 로직 ---
        function createCubeEdges(cx, cy, cz) {
            const v = [];
            for (let i = 0; i < 8; i++) {
                v.push({ x: cx + ((i & 1) ? 1 : -1), y: cy + ((i & 2) ? 1 : -1), z: cz + ((i & 4) ? 1 : -1), w: 0 });
            }
            const edges = [];
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 3; j++) {
                    let neighbor = i ^ (1 << j);
                    if (i < neighbor) edges.push({ p1: { ...v[i] }, p2: { ...v[neighbor] } });
                }
            }
            
            const faces = [
                [0,1,3,2], [4,5,7,6], // Front, Back
                [0,1,5,4], [2,3,7,6], // Bottom, Top
                [0,2,6,4], [1,3,7,5]  // Left, Right
            ];
            
            const triangles = [];
            faces.forEach(face => {
                triangles.push([ v[face[0]], v[face[1]], v[face[2]] ]);
                triangles.push([ v[face[0]], v[face[2]], v[face[3]] ]);
            });
            
            return { edges, triangles };
        }

        const baseCubes = [
            createCubeEdges(0, 0, 0),    // 0: Center
            createCubeEdges(2.1, 0, 0),  // 1: Right
            createCubeEdges(-2.1, 0, 0), // 2: Left
            createCubeEdges(0, 2.1, 0),  // 3: Top
            createCubeEdges(0, -2.1, 0), // 4: Bottom 1
            createCubeEdges(0, 0, 2.1),  // 5: Front
            createCubeEdges(0, 0, -2.1), // 6: Back
            createCubeEdges(0, -4.2, 0)  // 7: Tail (Orange)
        ];

        function rotate4D(p, axis, pivot, angle) {
            let { x, y, z, w } = p;
            if (axis === 'x') {
                let dx = x - pivot;
                return { x: pivot + dx * Math.cos(angle) - w * Math.sin(angle), y, z, w: dx * Math.sin(angle) + w * Math.cos(angle) };
            }
            if (axis === 'y') {
                let dy = y - pivot;
                return { x, y: pivot + dy * Math.cos(angle) - w * Math.sin(angle), z, w: dy * Math.sin(angle) + w * Math.cos(angle) };
            }
            if (axis === 'z') {
                let dz = z - pivot;
                return { x, y, z: pivot + dz * Math.cos(angle) - w * Math.sin(angle), w: dz * Math.sin(angle) + w * Math.cos(angle) };
            }
            return p;
        }

        function foldCubes(theta) {
            const foldedCubes = [];
            foldedCubes.push(baseCubes[0]); // Center
            
            const applyFold = (cube, axis, pivot, angle) => {
                return {
                    edges: cube.edges.map(e => ({ p1: rotate4D(e.p1, axis, pivot, angle), p2: rotate4D(e.p2, axis, pivot, angle) })),
                    triangles: cube.triangles.map(t => t.map(p => rotate4D(p, axis, pivot, angle)))
                };
            };

            foldedCubes.push(applyFold(baseCubes[1], 'x', 1.05, theta));
            foldedCubes.push(applyFold(baseCubes[2], 'x', -1.05, -theta));
            foldedCubes.push(applyFold(baseCubes[3], 'y', 1.05, theta));
            foldedCubes.push(applyFold(baseCubes[4], 'y', -1.05, -theta));
            foldedCubes.push(applyFold(baseCubes[5], 'z', 1.05, theta));
            foldedCubes.push(applyFold(baseCubes[6], 'z', -1.05, -theta));

            // Tail Cube (Double Fold)
            let tail = applyFold(baseCubes[7], 'y', -3.15, -theta); 
            tail = applyFold(tail, 'y', -1.05, -theta);             
            foldedCubes.push(tail);

            return foldedCubes;
        }

        // --- 3D Mesh 생성 ---
        const meshes = [];
        
        for (let i = 0; i < 8; i++) {
            const group = new THREE.Group();
            
            // 1. 선(Edges) - 첨부된 이미지처럼 선명하게 표현
            const lineGeo = new THREE.BufferGeometry();
            const linePos = new Float32Array(12 * 2 * 3);
            lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
            
            let lineColor = 0x93c5fd; // 기본 날개 큐브 (연한 파란 선)
            let lineOpacity = 0.9;
            let lineW = 2;
            
            if (i === 0) {
                lineColor = 0x6b21a8; // 중심 큐브 (진한 보라색)
                lineOpacity = 1.0;
                lineW = 3; // 테두리를 약간 더 두껍게 하여 중심을 강조
            } else if (i === 7) {
                lineColor = 0xfde68a; // 꼬리 큐브 (연한 노란 선)
                lineOpacity = 0.2;
                lineW = 1;
            }
            
            const lineMat = new THREE.LineBasicMaterial({ 
                color: lineColor, 
                linewidth: lineW, 
                transparent: true, 
                opacity: lineOpacity 
            });
            const lines = new THREE.LineSegments(lineGeo, lineMat);
            group.add(lines);
            
            // 2. 면(Faces) - 투명도(Opacity)를 0.2로 낮춰서 그림과 동일한 느낌 연출
            const faceGeo = new THREE.BufferGeometry();
            const facePos = new Float32Array(12 * 3 * 3);
            faceGeo.setAttribute('position', new THREE.BufferAttribute(facePos, 3));
            
            const faceMat = new THREE.MeshPhongMaterial({
                color: colors[i],
                transparent: true,
                opacity: 0.2, // 투명도를 일정하게 낮춰서 겹침이 예쁘게 보이도록 설정
                side: THREE.DoubleSide,
                depthWrite: false, 
                shininess: 80
            });
            const faces = new THREE.Mesh(faceGeo, faceMat);
            group.add(faces);
            
            scene.add(group);
            meshes.push({ group, lines, faces });
        }

        // 투영 업데이트
        function updateGeometry(deg) {
            let theta = deg * (Math.PI / 180);
            let folded = foldCubes(theta);
            
            // 원근감 극대화: camW 수치를 조절하여 밖으로 감싸는 큐브와 안쪽 큐브의 크기 차이를 확실하게 줌
            let camW = 4.8; 

            for (let i = 0; i < 8; i++) {
                let edges = folded[i].edges;
                let triangles = folded[i].triangles;
                
                let linePos = meshes[i].lines.geometry.attributes.position.array;
                let lIdx = 0;
                edges.forEach(e => {
                    let w1 = 3.0 / (camW - e.p1.w);
                    linePos[lIdx++] = e.p1.x * w1; linePos[lIdx++] = e.p1.y * w1; linePos[lIdx++] = e.p1.z * w1;
                    
                    let w2 = 3.0 / (camW - e.p2.w);
                    linePos[lIdx++] = e.p2.x * w2; linePos[lIdx++] = e.p2.y * w2; linePos[lIdx++] = e.p2.z * w2;
                });
                meshes[i].lines.geometry.attributes.position.needsUpdate = true;
                
                let facePos = meshes[i].faces.geometry.attributes.position.array;
                let fIdx = 0;
                triangles.forEach(t => {
                    t.forEach(p => {
                        let w = 3.0 / (camW - p.w);
                        facePos[fIdx++] = p.x * w; facePos[fIdx++] = p.y * w; facePos[fIdx++] = p.z * w;
                    });
                });
                // 빛 반사를 위해 법선 벡터 재계산
                meshes[i].faces.geometry.computeVertexNormals();
                meshes[i].faces.geometry.attributes.position.needsUpdate = true;
            }
        }

        // UI 컨트롤
        const slider = document.getElementById('slider-fold');
        const displayDeg = document.getElementById('display-deg');
        const btnPlay = document.getElementById('btn-play');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        
        let isPlaying = false;
        let currentAngle = 0;
        let playDirection = 1; 

        function togglePlayState() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                if (currentAngle >= 90) playDirection = -1;
                else if (currentAngle <= 0) playDirection = 1;
            } else {
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
            }
        }

        btnPlay.addEventListener('click', togglePlayState);

        slider.addEventListener('input', (e) => {
            currentAngle = parseFloat(e.target.value);
            displayDeg.innerText = currentAngle.toFixed(1);
            updateGeometry(currentAngle);
            if(isPlaying) togglePlayState();
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (isPlaying) {
                currentAngle += 0.3 * playDirection;
                if (currentAngle >= 90) { currentAngle = 90; togglePlayState(); } 
                else if (currentAngle <= 0) { currentAngle = 0; togglePlayState(); }
                
                slider.value = currentAngle;
                displayDeg.innerText = currentAngle.toFixed(1);
                updateGeometry(currentAngle);
            }
            renderer.render(scene, camera);
        }

        updateGeometry(0);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
